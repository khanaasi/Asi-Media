<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asi Media Admin Panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --bg: #0b0b0c; --panel: #121214; --primary: #e50914; --text: #ffffff; --border: #222226; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
    body { background: var(--bg); color: var(--text); }
    #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 10000; }
    .login-box { background: var(--panel); padding: 40px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--border); }
    .login-box h2 { color: var(--primary); margin-bottom: 25px; }
    .login-box input { width: 100%; padding: 14px; margin-bottom: 20px; background: #1c1c21; border: 1px solid var(--border); color: white; border-radius: 8px; }
    .login-box button { background: var(--primary); color: white; width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .header { background: var(--panel); padding: 15px 25px; display: flex; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .menu-toggle { font-size: 24px; cursor: pointer; margin-right: 20px; color: var(--primary); }
    .sidebar { position: fixed; left: -280px; top: 0; height: 100%; width: 280px; background: var(--panel); z-index: 999; transition: 0.3s; padding-top: 80px; border-right: 1px solid var(--border); }
    .sidebar.open { left: 0; }
    .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 998; }
    .sidebar-overlay.show { display: block; }
    .menu-item { display: flex; align-items: center; padding: 15px 25px; color: var(--text); cursor: pointer; transition: 0.2s; }
    .menu-item i { margin-right: 15px; width: 20px; color: var(--primary); }
    .menu-item:hover, .menu-item.active { background: rgba(229, 9, 20, 0.08); border-left: 4px solid var(--primary); color: var(--primary); }
    .main-content { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    .section-card { background: var(--panel); padding: 35px; border-radius: 12px; border: 1px solid var(--border); display: none; }
    .section-card.active { display: block; }
    .section-card h3 { border-bottom: 2px solid var(--primary); padding-bottom: 12px; margin-bottom: 25px; }
    .form-group { margin-bottom: 22px; }
    .form-group label { display: block; margin-bottom: 8px; color: #ccc; }
    .form-control { width: 100%; padding: 12px; background: #1a1a1f; border: 1px solid var(--border); border-radius: 8px; color: white; }
    textarea.form-control { height: 100px; resize: none; }
    .btn-submit { background: var(--primary); color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
    .scroll-list { max-height: 350px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; background: #0f0f11; margin-bottom: 20px; }
    .list-item { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer;}
    .delete-btn { background: #7c040a; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    .reset-btn { background: #007bff; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; margin-right: 5px;}
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1001; justify-content: center; align-items: center; }
    .modal-box { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 500px; padding: 35px; position: relative; }
    .close-modal { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; color: #777; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>
<body>

  <div id="loginScreen">
    <div class="login-box">
      <h2>Asi Media Admin</h2>
      <input type="password" id="adminPassInput" placeholder="Enter Admin Password">
      <button onclick="attemptLogin()">Log In</button>
    </div>
  </div>

  <div class="header">
    <span class="menu-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></span>
    <span class="site-name">Asi Media Portal</span>
  </div>
  <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

  <div class="sidebar" id="sidebar">
    <div class="menu-item active" onclick="switchSection('addPostSec')"><i class="fa-solid fa-plus"></i> Add Post</div>
    <div class="menu-item" onclick="switchSection('selectPostSec')"><i class="fa-solid fa-magnifying-glass"></i> Add Episode</div>
    <div class="menu-item" onclick="switchSection('deletePostSec')"><i class="fa-solid fa-trash-can"></i> Delete Data</div>
    <div class="menu-item" onclick="switchSection('shortenersSec')"><i class="fa-solid fa-link"></i> Shorteners</div>
    <div class="menu-item" onclick="switchSection('premiumSec')"><i class="fa-solid fa-user-shield"></i> Premium Users</div>
    <div class="menu-item" onclick="switchSection('linksSec')"><i class="fa-solid fa-gear"></i> Settings</div>
  </div>

  <div class="main-content">
    <div id="addPostSec" class="section-card active">
      <h3>Add New Post</h3>
      <form onsubmit="submitPost(event)">
        <div class="form-group"><input type="url" id="postImage" class="form-control" placeholder="Image URL" required></div>
        <div class="form-group"><input type="text" id="postName" class="form-control" placeholder="Post Name" required></div>
        <div class="form-group"><input type="text" id="postCategory" class="form-control" placeholder="Category (e.g. Hindi Sub)"></div>
        <div class="form-group"><input type="text" id="postGenre" class="form-control" placeholder="Genres (Comma separated)"></div>
        <div class="form-group"><input type="text" id="postRelease" class="form-control" placeholder="Release Date"></div>
        <div class="form-group"><input type="text" id="postSeason" class="form-control" placeholder="Season"></div>
        <div class="form-group"><textarea id="postStory" class="form-control" placeholder="Story details"></textarea></div>
        <button type="submit" class="btn-submit">Save Post</button>
      </form>
    </div>

    <div id="selectPostSec" class="section-card">
      <h3>Select Post to Add Episode</h3>
      <div class="scroll-list" id="selectionList"></div>
    </div>

    <div id="deletePostSec" class="section-card">
      <h3>Delete Post & Episodes</h3>
      <div class="scroll-list" id="deletionList"></div>
    </div>

    <div id="shortenersSec" class="section-card">
      <h3>Shortener Accounts</h3>
      <div class="scroll-list" id="shortenerList"></div>
      <form onsubmit="submitShortener(event)">
        <div class="form-group"><input type="text" id="dashUrl" class="form-control" placeholder="URL (e.g. gplinks.in)" required></div>
        <div class="form-group"><input type="text" id="apiKey" class="form-control" placeholder="API Key" required></div>
        <button type="submit" class="btn-submit">Add Shortener</button>
      </form>
    </div>

    <div id="premiumSec" class="section-card">
      <h3>Premium Users (Anti-Share)</h3>
      <div class="scroll-list" id="premiumUsersList"></div>
      <form onsubmit="submitPremium(event)">
        <div class="form-group"><input type="email" id="premUser" class="form-control" placeholder="User Email" required></div>
        <div class="form-group"><input type="text" id="premPass" class="form-control" placeholder="Password" required></div>
        <button type="submit" class="btn-submit">Add Premium User</button>
      </form>
    </div>

    <div id="linksSec" class="section-card">
      <h3>Site Settings</h3>
      <form onsubmit="submitSettings(event)">
        <div class="form-group"><label>Admin Password</label><input type="text" id="adminPass" class="form-control" required></div>
        <div class="form-group"><label>Player Password (Play Video)</label><input type="text" id="playerPass" class="form-control" required></div>
        <div class="form-group"><label>Channel Link</label><input type="url" id="chanLink" class="form-control"></div>
        <div class="form-group"><label>Group Link</label><input type="url" id="groupLink" class="form-control"></div>
        <button type="submit" class="btn-submit">Save Settings</button>
      </form>
    </div>
  </div>

  <div class="modal" id="modal"><div class="modal-box" id="modalContent"></div></div>

  <script>
    const supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
    function generateUUID() { return crypto.randomUUID(); }

    async function attemptLogin() {
      const pass = document.getElementById("adminPassInput").value;
      const { data } = await supabase.from('site_settings').select('admin_password').eq('id', 1).single();
      if (data && pass === data.admin_password) {
        document.getElementById("loginScreen").style.display = "none";
        loadAllData();
      } else { alert("Wrong Password!"); }
    }

    function toggleSidebar() { document.getElementById("sidebar").classList.toggle("open"); document.getElementById("overlay").classList.toggle("show"); }
    function switchSection(secId) { document.querySelectorAll(".section-card, .menu-item").forEach(el => el.classList.remove("active")); document.getElementById(secId).classList.add("active"); toggleSidebar(); }

    async function loadAllData() { fetchPosts(); fetchShorteners(); fetchSettings(); fetchPremiumUsers(); }

    async function submitPost(e) {
      e.preventDefault();
      await supabase.from('posts').insert([{ id: generateUUID(), image_url: document.getElementById("postImage").value, name: document.getElementById("postName").value, category: document.getElementById("postCategory").value, release_date: document.getElementById("postRelease").value, genres: document.getElementById("postGenre").value, season: document.getElementById("postSeason").value, short_story: document.getElementById("postStory").value }]);
      alert("Post Saved!"); e.target.reset(); fetchPosts();
    }

    async function fetchPosts() {
      const { data } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
      let selHtml = "", delHtml = "";
      if(data) {
        data.forEach(p => {
          selHtml += `<div class="list-item" onclick="openEpModal('${p.id}', '${p.name.replace(/'/g, "\\'")}')"><span>${p.name}</span><i class="fa-solid fa-plus"></i></div>`;
          delHtml += `<div class="list-item"><span>${p.name}</span><button class="delete-btn" onclick="deletePost('${p.id}')">Delete</button></div>`;
        });
      }
      document.getElementById("selectionList").innerHTML = selHtml; document.getElementById("deletionList").innerHTML = delHtml;
    }

    function openEpModal(postId, postName) {
      document.getElementById("modalContent").innerHTML = `
        <span class="close-modal" onclick="document.getElementById('modal').style.display='none'">&times;</span>
        <h3>Add Episode: ${postName}</h3>
        <form onsubmit="submitEpisode(event, '${postId}')">
          <div class="form-group"><input type="text" id="epLabel" class="form-control" placeholder="Episode No. (e.g. 01)" required></div>
          <div class="form-group"><input type="url" id="epOrig" class="form-control" placeholder="Direct Download Link" required></div>
          <div class="form-group"><input type="url" id="epPlay" class="form-control" placeholder="Play Video Link (Optional)"></div>
          <button type="submit" class="btn-submit">Add Episode</button>
        </form>`;
      document.getElementById("modal").style.display = "flex";
    }

    async function submitEpisode(e, postId) {
      e.preventDefault();
      await supabase.from('episodes').insert([{ id: generateUUID(), post_id: postId, episode_label: document.getElementById("epLabel").value, original_link: document.getElementById("epOrig").value, play_link: document.getElementById("epPlay").value }]);
      alert("Episode Added!"); document.getElementById('modal').style.display='none';
    }

    async function deletePost(id) {
      if(confirm("Delete this Post and all its episodes?")) {
        await supabase.from('episodes').delete().eq('post_id', id); await supabase.from('posts').delete().eq('id', id); fetchPosts();
      }
    }

    async function fetchShorteners() {
      const { data } = await supabase.from('shorteners').select('*');
      document.getElementById("shortenerList").innerHTML = data ? data.map(s => `<div class="list-item"><span>${s.dashboard_url}</span><button class="delete-btn" onclick="delShort('${s.id}')">Del</button></div>`).join("") : "";
    }
    async function submitShortener(e) { e.preventDefault(); await supabase.from('shorteners').insert([{ id: generateUUID(), dashboard_url: document.getElementById("dashUrl").value, api_key: document.getElementById("apiKey").value }]); fetchShorteners(); e.target.reset(); }
    async function delShort(id) { await supabase.from('shorteners').delete().eq('id', id); fetchShorteners(); }

    async function fetchPremiumUsers() {
      const { data } = await supabase.from('premium_users').select('*');
      document.getElementById("premiumUsersList").innerHTML = data ? data.map(u => `<div class="list-item"><span style="${u.device_id ? 'color:#00ff88' : ''}">${u.username} ${u.device_id ? '(Locked)' : '(New)'}</span><div><button class="reset-btn" onclick="resetDevice('${u.id}')">Reset Lock</button><button class="delete-btn" onclick="delPrem('${u.id}')">Del</button></div></div>`).join("") : "";
    }
    async function submitPremium(e) { e.preventDefault(); await supabase.from('premium_users').insert([{ id: generateUUID(), username: document.getElementById("premUser").value, password: document.getElementById("premPass").value }]); fetchPremiumUsers(); e.target.reset(); }
    async function delPrem(id) { await supabase.from('premium_users').delete().eq('id', id); fetchPremiumUsers(); }
    async function resetDevice(id) { await supabase.from('premium_users').update({ device_id: null }).eq('id', id); fetchPremiumUsers(); }

    async function fetchSettings() {
      const { data } = await supabase.from('site_settings').select('*').eq('id', 1).single();
      if(data) { document.getElementById("adminPass").value = data.admin_password; document.getElementById("playerPass").value = data.player_password; document.getElementById("chanLink").value = data.channel_link; document.getElementById("groupLink").value = data.group_link; }
    }
    async function submitSettings(e) {
      e.preventDefault();
      await supabase.from('site_settings').update({ admin_password: document.getElementById("adminPass").value, player_password: document.getElementById("playerPass").value, channel_link: document.getElementById("chanLink").value, group_link: document.getElementById("groupLink").value }).eq('id', 1);
      alert("Settings Updated!");
    }
  </script>
</body>
</html>
